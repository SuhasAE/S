<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Map — India's Living Heritage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96B;
    --gold-dim: rgba(201,168,76,0.15);
    --bg-dark: #0D0D0F;
    --bg-panel: rgba(13,13,15,0.92);
    --bg-card: rgba(20,18,14,0.96);
    --text-primary: #F0EAD6;
    --text-dim: rgba(240,234,214,0.5);
    --accent-red: #C0392B;
    --accent-teal: #2E9B8F;
    --nav-route: #4FC3F7;
    --panel-border: rgba(201,168,76,0.25);
    --radius: 12px;
    --sidebar-w: 340px;
    --ss-purple: #7C3AED;
    --ss-purple-light: #A78BFA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ─── GLOBE PROJECTION TRANSITION ─── */
  .maplibregl-canvas { transition: none; }

  /* ─── TOP BAR ─── */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, rgba(13,13,15,0.97), transparent);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
    pointer-events: none;
  }

  #logo {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    pointer-events: auto;
  }

  #logo span { color: var(--text-primary); font-weight: 400; }

  .divider-v { width: 1px; height: 24px; background: var(--panel-border); }

  #site-count {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: auto;
  }

  /* ─── SANSKRITI SPHERE FEATURE BUTTON ─── */
  #ss-feature-btn {
    margin-left: auto;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #4C1D95 0%, #7C3AED 50%, #A78BFA 100%);
    border: 1px solid rgba(167,139,250,0.5);
    border-radius: 100px;
    padding: 8px 18px 8px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(124,58,237,0.4), 0 4px 16px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  #ss-feature-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  #ss-feature-btn:hover::before { opacity: 1; }
  #ss-feature-btn:hover { 
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(124,58,237,0.6), 0 8px 24px rgba(0,0,0,0.5);
    border-color: rgba(167,139,250,0.8);
  }

  .ss-icon-wrap {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .ss-label-wrap { display: flex; flex-direction: column; }

  .ss-eyebrow {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    line-height: 1;
    margin-bottom: 2px;
  }

  .ss-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .ss-arrow {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-left: 4px;
  }

  /* Pulse animation for attention */
  @keyframes ssPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.4), 0 4px 16px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 0 35px rgba(124,58,237,0.7), 0 4px 20px rgba(0,0,0,0.5); }
  }
  #ss-feature-btn { animation: ssPulse 3s ease-in-out infinite; }
  #ss-feature-btn:hover { animation: none; }

  /* ─── SEARCH BAR ─── */
  #search-container {
    position: absolute;
    top: 76px;
    left: 50%;
    transform: translateX(-50%);
    width: 480px;
    z-index: 100;
  }

  #search-wrap {
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--panel-border);
    border-radius: 100px;
    padding: 10px 20px;
    gap: 10px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.08);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search-wrap:focus-within {
    border-color: var(--gold);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.15);
  }

  #search-icon { color: var(--gold); font-size: 16px; flex-shrink: 0; }

  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }

  #search-input::placeholder { color: var(--text-dim); }

  #search-results {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    margin-top: 8px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
    backdrop-filter: blur(16px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  .search-result-item {
    padding: 12px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    transition: background 0.15s;
  }

  .search-result-item:hover { background: var(--gold-dim); }
  .search-result-item:last-child { border-bottom: none; }

  .sri-icon { font-size: 18px; }
  .sri-info { flex: 1; min-width: 0; }
  .sri-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sri-loc { font-size: 11px; color: var(--text-dim); }
  .sri-cat {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold);
    background: var(--gold-dim); padding: 2px 8px; border-radius: 100px; white-space: nowrap;
  }

  /* ─── FILTERS ─── */
  #filters {
    position: absolute;
    top: 76px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }

  .filter-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--panel-border);
    border-radius: 100px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(12px);
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ─── SIDE PANEL ─── */
  #side-panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--bg-panel);
    border-left: 1px solid var(--panel-border);
    backdrop-filter: blur(20px);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column; overflow: hidden;
  }

  #side-panel.open { transform: translateX(0); }

  #panel-header {
    padding: 20px;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }

  #panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    font-size: 18px; width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  #panel-close:hover { border-color: var(--gold); color: var(--gold); }

  #panel-category { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  #panel-name { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 4px; }
  #panel-location { font-size: 12px; color: var(--text-dim); }

  #panel-meta { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }

  .meta-tag { font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08); }
  .meta-tag.gold { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-dim); }

  #panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  #panel-description { font-size: 13px; line-height: 1.7; color: rgba(240,234,214,0.75); }

  .panel-section-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }

  /* ─── GROQ AI CHAT ─── */
  #chat-section {
    border-top: 1px solid var(--panel-border);
    padding: 16px;
    flex-shrink: 0;
  }

  #chat-label-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .groq-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(90deg, #f97316, #ef4444);
    padding: 2px 7px;
    border-radius: 100px;
  }

  #chat-messages {
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-bubble { padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; max-width: 90%; }
  .chat-bubble.user { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); color: var(--gold-light); align-self: flex-end; }
  .chat-bubble.ai { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text-primary); align-self: flex-start; }
  .chat-bubble.loading { opacity: 0.6; font-style: italic; }

  #chat-input-row { display: flex; gap: 8px; }

  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--panel-border);
    border-radius: 100px;
    padding: 8px 14px;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; outline: none;
    transition: border-color 0.2s;
  }

  #chat-input:focus { border-color: var(--gold); }
  #chat-input::placeholder { color: var(--text-dim); }

  #chat-send {
    width: 34px; height: 34px;
    background: var(--gold);
    border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }

  #chat-send:hover { background: var(--gold-light); transform: scale(1.05); }

  /* ─── NAVIGATION HUD ─── */
  #nav-hud {
    position: absolute;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    opacity: 0; pointer-events: none;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 150; width: 420px;
  }

  #nav-hud.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  #nav-card {
    background: var(--bg-card);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 16px 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    display: flex; flex-direction: column; gap: 10px;
  }

  #nav-instruction { font-size: 16px; font-weight: 500; color: var(--text-primary); }

  #nav-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .nav-stat { font-size: 13px; }
  .nav-stat span { color: var(--gold); font-weight: 600; }

  #nav-progress { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  #nav-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--nav-route)); border-radius: 2px; width: 0%; transition: width 0.3s; }

  #nav-steps { max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .nav-step { font-size: 11px; color: var(--text-dim); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 8px; align-items: flex-start; }
  .nav-step.current { color: var(--nav-route); }
  .step-num { color: var(--gold); font-weight: 600; flex-shrink: 0; }

  #nav-buttons { display: flex; gap: 8px; }

  #nav-close-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    color: var(--text-dim); font-size: 12px; padding: 6px 16px;
    border-radius: 100px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  #nav-close-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* DRONE FOLLOW BUTTON */
  #drone-follow-btn {
    background: rgba(79,195,247,0.12);
    border: 1px solid rgba(79,195,247,0.35);
    color: var(--nav-route); font-size: 12px; padding: 6px 16px;
    border-radius: 100px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }

  #drone-follow-btn.active {
    background: rgba(79,195,247,0.25);
    border-color: var(--nav-route);
    color: #fff;
  }

  #drone-follow-btn:hover { border-color: var(--nav-route); }

  /* RECENTER BUTTON */
  #recenter-btn {
    position: absolute;
    bottom: 210px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    opacity: 0; pointer-events: none;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 150;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--nav-route);
    color: var(--nav-route); font-size: 13px; padding: 8px 18px;
    border-radius: 100px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(79,195,247,0.25);
  }

  #recenter-btn.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #recenter-btn:hover { background: rgba(79,195,247,0.1); }

  /* ─── BOTTOM CONTROLS ─── */
  #bottom-controls {
    position: absolute;
    bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 100;
  }

  .map-ctrl-btn {
    width: 40px; height: 40px;
    background: var(--bg-card);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    color: var(--text-primary); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px); transition: all 0.2s;
  }

  .map-ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
  .map-ctrl-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

  /* ─── LEGEND ─── */
  #legend {
    position: absolute; bottom: 20px; left: 20px;
    background: var(--bg-card); border: 1px solid var(--panel-border);
    border-radius: var(--radius); padding: 12px 16px;
    z-index: 100; backdrop-filter: blur(12px);
  }

  .legend-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ─── TOAST ─── */
  #toast {
    position: absolute; top: 76px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    opacity: 0;
    background: var(--bg-card); border: 1px solid var(--panel-border);
    border-radius: 100px; padding: 8px 20px; font-size: 12px; color: var(--text-primary);
    z-index: 999; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── UNESCO BADGE ─── */
  .unesco-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: #fff; background: linear-gradient(135deg, #1565C0, #0D47A1);
    padding: 3px 10px; border-radius: 100px;
  }

  /* ─── NAVIGATE BTN ─── */
  #navigate-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--gold); color: var(--bg-dark); border: none;
    border-radius: 100px; padding: 10px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; width: 100%; justify-content: center;
  }

  #navigate-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

  /* ─── LOADING ─── */
  #loader {
    position: absolute; inset: 0; background: var(--bg-dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 20px; transition: opacity 0.6s;
  }

  #loader.done { opacity: 0; pointer-events: none; visibility: hidden; }

  #loader-logo { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 700; color: var(--gold); text-shadow: 0 0 60px rgba(201,168,76,0.5); letter-spacing: 0.05em; }
  #loader-sub { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }

  .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .loader-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); animation: loadbar 1.5s ease-in-out forwards; border-radius: 2px; }

  @keyframes loadbar { from { width: 0; } to { width: 100%; } }

  /* ─── MARKER POPUP ─── */
  .maplibregl-popup-content {
    background: var(--bg-card) !important;
    border: 1px solid var(--panel-border) !important;
    border-radius: var(--radius) !important;
    padding: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    min-width: 200px;
  }

  .maplibregl-popup-tip { display: none !important; }
  .maplibregl-popup-close-button { color: var(--text-dim) !important; padding: 6px 10px !important; }

  .popup-inner { padding: 14px 16px; }
  .popup-cat { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .popup-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--text-primary); margin-bottom: 6px; line-height: 1.3; }
  .popup-loc { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  .popup-actions { display: flex; gap: 6px; }

  .popup-btn {
    flex: 1; padding: 6px 0; border-radius: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center; border: none;
  }

  .popup-btn.primary { background: var(--gold); color: var(--bg-dark); }
  .popup-btn.primary:hover { background: var(--gold-light); }
  .popup-btn.secondary { background: rgba(255,255,255,0.06); color: var(--text-primary); border: 1px solid var(--panel-border); }
  .popup-btn.secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ─── NEAR ME ─── */
  #near-me-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; }

  #near-me-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent-teal); color: #fff; border: none;
    border-radius: 100px; padding: 10px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(46,155,143,0.4);
  }

  #near-me-btn:hover { background: #3DB8AB; transform: translateY(-1px); }

  /* ─── DRONE INDICATOR ─── */
  #drone-indicator {
    position: absolute; top: 76px; right: 20px; z-index: 150;

// ════════════════════════════════════════════════════════
//  MAP INIT
// ════════════════════════════════════════════════════════
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: MAP_STYLE,
    center: [79.0, 22.0],
    zoom: 4.5,
    pitch: 45,
    bearing: -10,
    antialias: true,
    maxPitch: 75,
    // Smooth zoom
    scrollZoom: { around: 'cursor' }
  });

  // Custom NavigationControl with smooth zoom
  map.addControl(new maplibregl.NavigationControl({ showCompass: true, visualizePitch: true }), 'bottom-right');

  // Smooth zoom override
  map.scrollZoom.setZoomRate(1/450);
  map.scrollZoom.setWheelZoomRate(1/450);

  map.on('load', () => {
    plotMarkers(HERITAGE_SITES);
    document.getElementById('site-count').textContent = `${HERITAGE_SITES.length} Heritage Sites`;
    setTimeout(() => document.getElementById('loader').classList.add('done'), 800);

    // Listen for zoom changes to switch to globe projection
    map.on('zoom', handleZoomProjection);
  });

  map.on('error', (e) => console.warn('Map resource warning:', e.error?.message || e));
  map.on('click', () => { if (activePopup) { activePopup.remove(); activePopup = null; } });

  // Show recenter when user pans away during navigation
  map.on('dragstart', () => {
    if (routeActive) {
      document.getElementById('recenter-btn').classList.add('active');
    }
  });
}

// ════════════════════════════════════════════════════════
//  GLOBE PROJECTION — auto switch at zoom < 3.5 (debounced to prevent freeze)
// ════════════════════════════════════════════════════════
let _projTimer = null;
function handleZoomProjection() {
  clearTimeout(_projTimer);
  _projTimer = setTimeout(() => {
    try {
      const z = map.getZoom();
      if (z < 3.2 && currentProjection !== 'globe') {
        currentProjection = 'globe';
        map.setProjection({ type: 'globe' });
        showToast('🌍 Globe view');
      } else if (z >= 3.2 && currentProjection !== 'mercator') {
        currentProjection = 'mercator';
        map.setProjection({ type: 'mercator' });
      }
    } catch(e) { console.warn('Projection switch skipped:', e.message); }
  }, 200);
}

// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
function createMarkerEl(site) {
  const el = document.createElement('div');
  const color = site.unesco ? '#FFD700' : (CAT_COLORS[site.cat] || CAT_COLORS.default);
  const icon = CAT_ICONS[site.cat] || CAT_ICONS.default;

  el.innerHTML = `
    <div style="
      position:relative; width:${site.unesco ? '34px' : '28px'}; height:${site.unesco ? '34px' : '28px'};
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition: transform 0.15s;
    ">
      <div style="
        position:absolute; inset:0;
        background: radial-gradient(circle at 35% 35%, ${color}cc, ${color}44);
        border: 2px solid ${color}; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
        box-shadow: 0 2px 12px ${color}66, 0 0 0 3px ${color}22;
      "></div>
      <div style="position:relative; z-index:1; font-size:${site.unesco ? '14px' : '11px'}; transform: translateY(-2px); line-height:1;">${icon}</div>
    </div>
  `;

  el.style.cssText = 'cursor:pointer; transform-origin:bottom center;';
  el.title = site.name;
  el.addEventListener('mouseenter', () => { el.querySelector('div').style.transform = 'scale(1.2)'; });
  el.addEventListener('mouseleave', () => { el.querySelector('div').style.transform = 'scale(1)'; });
  return el;
}

function plotMarkers(sites) {
  allMarkers.forEach(m => m.marker.remove());
  allMarkers = [];

  sites.forEach(site => {
    const el = createMarkerEl(site);
    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([site.lng, site.lat]).addTo(map);

    marker.getElement().addEventListener('click', (e) => { e.stopPropagation(); showPopup(site, [site.lng, site.lat]); });
    allMarkers.push({ site, marker });
  });
}

// ════════════════════════════════════════════════════════
//  POPUP
// ════════════════════════════════════════════════════════
function showPopup(site, lngLat) {
  if (activePopup) activePopup.remove();
  const icon = CAT_ICONS[site.cat] || CAT_ICONS.default;

  const html = `
    <div class="popup-inner">
      <div class="popup-cat">${icon} ${site.cat.toUpperCase()}${site.unesco ? ' · 🏅 UNESCO' : ''}</div>
      <div class="popup-name">${site.name}</div>
      <div class="popup-loc">📍 ${site.city}, ${site.state}</div>
      <div class="popup-actions">
        <button class="popup-btn primary" onclick="openPanel(${site.id})">Details</button>
        <button class="popup-btn secondary" onclick="flyTo(${site.lat}, ${site.lng})">Fly Here</button>
      </div>
    </div>
  `;

  activePopup = new maplibregl.Popup({ closeButton: true, maxWidth: '240px' })
    .setLngLat(lngLat).setHTML(html).addTo(map);
}

function flyTo(lat, lng, zoom = 15) {
  map.flyTo({ center: [lng, lat], zoom, pitch: 60, bearing: Math.random() * 60 - 30, duration: 2800, essential: true, curve: 1.5, speed: 0.8 });
}

// ════════════════════════════════════════════════════════
//  NAVIGATION — Step-by-step with drone follow
// ════════════════════════════════════════════════════════
document.getElementById('navigate-btn').addEventListener('click', () => {
  if (!currentSite) return;
  if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
  showToast('Getting your location...');

  navigator.geolocation.getCurrentPosition(pos => {
    const start = [pos.coords.longitude, pos.coords.latitude];
    const end = [currentSite.lng, currentSite.lat];
    lastUserPos = start;
    fetchRoute(start, end);

    // Place user marker
    if (userMarker) userMarker.remove();
    const userEl = document.createElement('div');
    userEl.style.cssText = `
      width:16px; height:16px; background: #4FC3F7;
      border: 3px solid white; border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(79,195,247,0.3), 0 2px 8px rgba(0,0,0,0.4);
    `;
    userMarker = new maplibregl.Marker({ element: userEl }).setLngLat(start).addTo(map);

    // Start watching user position for live tracking
    if (userGeoWatcher) navigator.geolocation.clearWatch(userGeoWatcher);
    userGeoWatcher = navigator.geolocation.watchPosition(livePositionUpdate, null, { enableHighAccuracy: true, maximumAge: 2000 });

  }, () => { showToast('Could not get location. Using demo route.'); fetchDemoRoute(); });
});

function livePositionUpdate(pos) {
  if (!routeActive) return;
  const lngLat = [pos.coords.longitude, pos.coords.latitude];
  lastUserPos = lngLat;

  if (userMarker) userMarker.setLngLat(lngLat);

  // Update nav step based on proximity
  if (routeCoords && routeCoords.length > 0) {
    updateNavStep(lngLat);
  }

  // Drone follow: move camera to follow user
  if (droneFollowActive) {
    map.easeTo({
      center: lngLat,
      zoom: map.getZoom() < 14 ? 14 : map.getZoom(),
      pitch: 60,
      bearing: computeBearing(lngLat),
      duration: 1000,
      essential: false
    });
    document.getElementById('recenter-btn').classList.remove('active');
  }
}

function computeBearing(currentPos) {
  if (!routeCoords || routeCoords.length < 2) return map.getBearing();
  // Find nearest route point and compute bearing to next point
  let minDist = Infinity, nearIdx = 0;
  for (let i = 0; i < routeCoords.length; i++) {
    const d = Math.hypot(routeCoords[i][0] - currentPos[0], routeCoords[i][1] - currentPos[1]);
    if (d < minDist) { minDist = d; nearIdx = i; }
  }
  const nextIdx = Math.min(nearIdx + 3, routeCoords.length - 1);
  const dx = routeCoords[nextIdx][0] - currentPos[0];
  const dy = routeCoords[nextIdx][1] - currentPos[1];
  return (Math.atan2(dx, dy) * 180 / Math.PI);
}

function updateNavStep(userLngLat) {
  if (!routeCoords) return;
  // Simple proximity-based step advancement
  const totalPts = routeCoords.length;
  const progress = Math.min(navStepIndex / totalPts, 1);
  document.getElementById('nav-progress-fill').style.width = `${Math.round(progress * 100)}%`;

  // Find closest point on route
  let minDist = Infinity, closestIdx = 0;
  for (let i = 0; i < totalPts; i++) {
    const d = Math.hypot(routeCoords[i][0] - userLngLat[0], routeCoords[i][1] - userLngLat[1]);
    if (d < minDist) { minDist = d; closestIdx = i; }
  }
  navStepIndex = closestIdx;

  // Remaining distance approximation
  const remainPts = routeCoords.slice(closestIdx);
  let remainDist = 0;
  for (let i = 0; i < remainPts.length - 1; i++) {
    remainDist += Math.hypot((remainPts[i+1][0]-remainPts[i][0])*111000, (remainPts[i+1][1]-remainPts[i][1])*111000);
  }
  const remainKm = (remainDist / 1000).toFixed(1);
  const etaMins = Math.ceil(remainDist / 600);
  document.getElementById('nav-dist').textContent = `${remainKm} km`;
  document.getElementById('nav-eta').textContent = `~${etaMins} min`;
}

async function fetchRoute(start, end) {
  showToast('Fetching road route...');
  try {
    // OSRM public demo server — real road routing, no API key required
    const url = `https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson&steps=true&annotations=false`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('OSRM error');
    const data = await res.json();
    if (!data.routes || !data.routes.length) throw new Error('No route found');

    const route = data.routes[0];
    const coords = route.geometry.coordinates;

    // Build steps from OSRM legs
    const steps = [];
    for (const leg of route.legs) {
      for (const step of leg.steps) {
        if (step.maneuver && step.name !== undefined) {
          const type = step.maneuver.type;
          const modifier = step.maneuver.modifier || '';
          const name = step.name || 'unnamed road';
          let instruction = '';
          if (type === 'depart') instruction = `Start on ${name}`;
          else if (type === 'arrive') instruction = `Arrive at ${currentSite?.name || 'destination'}`;
          else if (type === 'turn') instruction = `Turn ${modifier} onto ${name}`;
          else if (type === 'new name') instruction = `Continue onto ${name}`;
          else if (type === 'merge') instruction = `Merge onto ${name}`;
          else if (type === 'roundabout') instruction = `Take roundabout exit onto ${name}`;
          else instruction = `${type.charAt(0).toUpperCase() + type.slice(1)} ${modifier} ${name}`.trim();
          steps.push({ instruction, distance: step.distance });
        }
      }
    }

    const props = {
      summary: { distance: route.distance, duration: route.duration },
      segments: [{ steps }]
    };
    displayRoute(coords, props);
    showToast('🛣️ Road route loaded!');
  } catch (e) {
    console.warn('OSRM routing failed, using demo:', e);
    showToast('Using approximate route (road API unavailable)');
    fetchDemoRoute(start, end);
  }
}

function catmullRomSpline(points, numPoints = 50) {
  if (points.length < 2) return points;
  const result = [];
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[Math.min(points.length - 1, i + 1)];
    const p3 = points[Math.min(points.length - 1, i + 2)];
    for (let t = 0; t < numPoints; t++) {
      const tt = t / numPoints, tt2 = tt * tt, tt3 = tt2 * tt;
      const lng = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * tt + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * tt2 + (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * tt3);
      const lat = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * tt + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * tt2 + (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * tt3);
      result.push([lng, lat]);
    }
  }
  result.push(points[points.length - 1]);
  return result;
}

function fetchDemoRoute(start, end) {
  if (!start || !end) {
    if (!currentSite) return;
    start = [currentSite.lng - 0.2, currentSite.lat - 0.15];
    end = [currentSite.lng, currentSite.lat];
  }
  const midLng = (start[0] + end[0]) / 2 + (Math.random() - 0.5) * 0.08;
  const midLat = (start[1] + end[1]) / 2 + (Math.random() - 0.5) * 0.08;
  const smooth = catmullRomSpline([start, [midLng, midLat], end], 30);
  const distKm = Math.sqrt(Math.pow((end[0]-start[0])*111, 2) + Math.pow((end[1]-start[1])*111, 2)).toFixed(1);
  const etaMins = Math.ceil(distKm / 0.6);
  const fakeProps = {
    summary: { distance: distKm * 1000, duration: etaMins * 60 },
    segments: [{ steps: [
      { instruction: 'Head towards destination', distance: distKm * 300 },
      { instruction: `Continue towards ${currentSite?.name || 'destination'}`, distance: distKm * 500 },
      { instruction: 'Arrive at heritage site', distance: 0 }
    ]}]
  };
  displayRoute(smooth, fakeProps);
}

function displayRoute(coords, props) {
  ['route-glow','route-line','route-outline'].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
  if (map.getSource('route')) map.removeSource('route');

  routeCoords = coords;
  navStepIndex = 0;

  map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });

  map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4FC3F7', 'line-width': 14, 'line-opacity': 0.2, 'line-blur': 8 } });
  map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#4FC3F7', 'line-width': 5, 'line-opacity': 0.9 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });

  routeActive = true;

  const distKm = (props.summary.distance / 1000).toFixed(1);
  const etaMins = Math.ceil(props.summary.duration / 60);

  document.getElementById('nav-instruction').textContent = `Navigating to ${currentSite?.name || 'destination'}`;
  document.getElementById('nav-dist').textContent = `${distKm} km`;
  document.getElementById('nav-eta').textContent = `~${etaMins} min`;
  document.getElementById('nav-progress-fill').style.width = '5%';

  const steps = props.segments?.[0]?.steps || [];
  document.getElementById('nav-steps').innerHTML = steps.map((s, i) => `
    <div class="nav-step ${i === 0 ? 'current' : ''}">
      <span class="step-num">${i + 1}.</span>
      <span>${s.instruction}</span>
    </div>
  `).join('');

  document.getElementById('nav-hud').classList.add('active');

  const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
  map.fitBounds(bounds, { padding: { top: 100, bottom: 220, left: 80, right: 80 }, pitch: 55, duration: 2000 });
}

// ─── DRONE FOLLOW ───
document.getElementById('drone-follow-btn').addEventListener('click', () => {
  droneFollowActive = !droneFollowActive;
  const btn = document.getElementById('drone-follow-btn');
  const indicator = document.getElementById('drone-indicator');

  if (droneFollowActive) {
    btn.classList.add('active');
    btn.textContent = '🚁 Following...';
    indicator.classList.add('active');
    showToast('Drone follow ON — camera tracks your position');

    // If we have a last position, immediately center
    if (lastUserPos) {
      map.easeTo({ center: lastUserPos, zoom: 14, pitch: 60, duration: 800 });
      document.getElementById('recenter-btn').classList.remove('active');
    }
  } else {
    btn.classList.remove('active');
    btn.textContent = '🚁 Drone Follow';
    indicator.classList.remove('active');
    showToast('Drone follow OFF');
  }
});

// ─── RECENTER ───
document.getElementById('recenter-btn').addEventListener('click', () => {
  if (lastUserPos && routeActive) {
    map.easeTo({ center: lastUserPos, zoom: 14, pitch: 60, duration: 800 });
    document.getElementById('recenter-btn').classList.remove('active');
  } else if (routeCoords) {
    const bounds = routeCoords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(routeCoords[0], routeCoords[0]));
    map.fitBounds(bounds, { padding: 80, duration: 1200 });
    document.getElementById('recenter-btn').classList.remove('active');
  }
});

// ─── CLOSE NAV ───
document.getElementById('nav-close-btn').addEventListener('click', () => {
  ['route-glow','route-line'].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
  if (map.getSource('route')) map.removeSource('route');
  if (userMarker) { userMarker.remove(); userMarker = null; }
  if (userGeoWatcher) { navigator.geolocation.clearWatch(userGeoWatcher); userGeoWatcher = null; }
  document.getElementById('nav-hud').classList.remove('active');
  document.getElementById('recenter-btn').classList.remove('active');
  document.getElementById('drone-indicator').classList.remove('active');
  document.getElementById('drone-follow-btn').classList.remove('active');
  document.getElementById('drone-follow-btn').textContent = '🚁 Drone Follow';
  routeActive = false;
  droneFollowActive = false;
  routeCoords = null;
  lastUserPos = null;
  navStepIndex = 0;
});

// ════════════════════════════════════════════════════════
//  AI CHAT — calls your Cloudflare Worker proxy (no API key in this file)
//  Deploy worker.js to Cloudflare Workers, then paste your worker URL below.
// ════════════════════════════════════════════════════════

// 👇 Replace with your deployed Cloudflare Worker URL after deploying worker.js
const CF_WORKER_URL = 'https://heritage-ai.anubhuthimap.workers.dev/ai';

async function askAI(question) {
  if (!currentSite) return;
  const chatEl = document.getElementById('chat-messages');

  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.textContent = question;
  chatEl.appendChild(userBubble);

  const loadBubble = document.createElement('div');
  loadBubble.className = 'chat-bubble ai loading';
  loadBubble.textContent = 'Researching...';
  chatEl.appendChild(loadBubble);
  chatEl.scrollTop = chatEl.scrollHeight;

  const systemPrompt = `You are Dora, a warm and knowledgeable heritage guide for Heritage Map, an Indian heritage exploration app. Introduce yourself as Dora when relevant. Be conversational, vivid, and passionate about Indian history. You are currently providing information about: ${currentSite.name} in ${currentSite.city}, ${currentSite.state}. Dynasty: ${currentSite.dynasty}, Era: ${currentSite.era}. Description: ${currentSite.desc}. Answer questions about this site with vivid, accurate detail. Keep answers to 2-3 sentences unless more is needed.`;

  try {
    const response = await fetch(CF_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, question })
    });

    if (!response.ok) throw new Error(`Worker returned ${response.status}`);
    const data = await response.json();
    loadBubble.classList.remove('loading');
    loadBubble.textContent = data.answer || 'No response from AI.';
  } catch (e) {
    loadBubble.classList.remove('loading');
    loadBubble.textContent = `${currentSite.name} was built during the ${currentSite.dynasty} period (${currentSite.era}). ${currentSite.desc.split('.')[0]}. (AI unavailable — check your Worker URL.)`;
  }

  chatEl.scrollTop = chatEl.scrollHeight;
}

document.getElementById('chat-send').addEventListener('click', () => {
  const q = document.getElementById('chat-input').value.trim();
  if (!q) return;
  document.getElementById('chat-input').value = '';
  askAI(q);
});

document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('chat-send').click();
});

// ════════════════════════════════════════════════════════
//  MAP CONTROLS
// ════════════════════════════════════════════════════════
let is3D = true;
document.getElementById('btn-3d').addEventListener('click', () => {
  is3D = !is3D;
  map.easeTo({ pitch: is3D ? 50 : 0, duration: 800 });
  document.getElementById('btn-3d').classList.toggle('active', is3D);
  showToast(is3D ? '3D mode on' : 'Flat map mode');
});

document.getElementById('btn-location').addEventListener('click', () => {
  navigator.geolocation?.getCurrentPosition(pos => {
    map.flyTo({ center: [pos.coords.longitude, pos.coords.latitude], zoom: 12, pitch: 45, duration: 1500 });
  }, () => showToast('Location access denied'));
});

document.getElementById('btn-globe').addEventListener('click', () => {
  clearTimeout(_projTimer); // cancel any pending auto-switch
  if (currentProjection === 'globe') {
    currentProjection = 'mercator';
    try { map.setProjection({ type: 'mercator' }); } catch(e) {}
    map.flyTo({ center: [79.0, 22.0], zoom: 4.5, pitch: 45, duration: 1500 });
    document.getElementById('btn-globe').classList.remove('active');
    showToast('Map view');
  } else {
    currentProjection = 'globe';
    try { map.setProjection({ type: 'globe' }); } catch(e) {}
    map.flyTo({ center: [79.0, 22.0], zoom: 2.5, pitch: 0, duration: 1800 });
    document.getElementById('btn-globe').classList.add('active');
    showToast('🌍 Globe view');
  }
});

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

//  START
// ════════════════════════════════════════════════════════
function hideLoader() { document.getElementById('loader').classList.add('done'); }
const loaderFallback = setTimeout(hideLoader, 6000);
initMap();
map.on('load', () => clearTimeout(loaderFallback));
</script>
